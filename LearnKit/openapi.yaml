      required: true
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradeRange"
              - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradePercentage"
              - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.DateRange"
              - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.Memberships"
              - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.ContentComplete"
              - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradeCompleted"
              - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.ContentReviewed"
            discriminator:
              propertyName: type
              mapping:
                GradeRange: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradeRange"
                GradePercentage: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradePercentage"
                DateRange: "#/components/schemas/AdaptiveReleaseRuleCriterion.DateRange"
                Memberships: "#/components/schemas/AdaptiveReleaseRuleCriterion.Memberships"
                ContentComplete: "#/components/schemas/AdaptiveReleaseRuleCriterion.ContentComplete"
                GradeCompleted: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradeCompleted"
                ContentReviewed: "#/components/schemas/AdaptiveReleaseRuleCriterion.ContentReviewed"

  responses:
    AnyAdaptiveReleaseRuleCriterion:
      description: OK
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradeRange"
              - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradePercentage"
              - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.DateRange"
              - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.Memberships"
              - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.ContentComplete"
              - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradeCompleted"
              - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.ContentReviewed"
            discriminator:
              propertyName: type
              mapping:
                GradeRange: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradeRange"
                GradePercentage: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradePercentage"
                DateRange: "#/components/schemas/AdaptiveReleaseRuleCriterion.DateRange"
                Memberships: "#/components/schemas/AdaptiveReleaseRuleCriterion.Memberships"
                ContentComplete: "#/components/schemas/AdaptiveReleaseRuleCriterion.ContentComplete"
                GradeCompleted: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradeCompleted"
                ContentReviewed: "#/components/schemas/AdaptiveReleaseRuleCriterion.ContentReviewed"

  schemas:
    # Common
    RestException:
      type: object
      properties:
        status:
          type: string
          description: Represents HTTP Status code in the response header.
        code:
          type: string
          description: The error code specific to a particular REST API. It is usually something that conveys information specific to the problem domain. For cases where the HTTP Status code conveys all the information required (such as a 404-Not Found) then the code may be omitted.
        message:
          type: string
          description: Error message that should be easy to understand and convey a concise reason as to why the error occurred.
        developerMessage:
          type: string
          description: Represents any technical information that a developer calling REST API might find useful.
        extraInfo:
          type: string
          description: Indicates a URL that anyone seeing the error message can click in a browser. The target web page should describe the error condition fully, as well as potential solutions to help them resolve the error condition.
      required:
        - message
    HttpStatus:
      type: string
      enum:
        - CONTINUE
        - SWITCHING_PROTOCOLS
        - PROCESSING
        - CHECKPOINT
        - OK
        - CREATED
        - ACCEPTED
        - NON_AUTHORITATIVE_INFORMATION
        - NO_CONTENT
        - RESET_CONTENT
        - PARTIAL_CONTENT
        - MULTI_STATUS
        - ALREADY_REPORTED
        - IM_USED
        - MULTIPLE_CHOICES
        - MOVED_PERMANENTLY
        - FOUND
        - MOVED_TEMPORARILY
        - SEE_OTHER
        - NOT_MODIFIED
        - USE_PROXY
        - TEMPORARY_REDIRECT
        - PERMANENT_REDIRECT
        - BAD_REQUEST
        - UNAUTHORIZED
        - PAYMENT_REQUIRED
        - FORBIDDEN
        - NOT_FOUND
        - METHOD_NOT_ALLOWED
        - NOT_ACCEPTABLE
        - PROXY_AUTHENTICATION_REQUIRED
        - REQUEST_TIMEOUT
        - CONFLICT
        - GONE
        - LENGTH_REQUIRED
        - PRECONDITION_FAILED
        - PAYLOAD_TOO_LARGE
        - REQUEST_ENTITY_TOO_LARGE
        - URI_TOO_LONG
        - REQUEST_URI_TOO_LONG
        - UNSUPPORTED_MEDIA_TYPE
        - REQUESTED_RANGE_NOT_SATISFIABLE
        - EXPECTATION_FAILED
        - I_AM_A_TEAPOT
        - INSUFFICIENT_SPACE_ON_RESOURCE
        - METHOD_FAILURE
        - DESTINATION_LOCKED
        - UNPROCESSABLE_ENTITY
        - LOCKED
        - FAILED_DEPENDENCY
        - TOO_EARLY
        - UPGRADE_REQUIRED
        - PRECONDITION_REQUIRED
        - TOO_MANY_REQUESTS
        - REQUEST_HEADER_FIELDS_TOO_LARGE
        - UNAVAILABLE_FOR_LEGAL_REASONS
        - INTERNAL_SERVER_ERROR
        - NOT_IMPLEMENTED
        - BAD_GATEWAY
        - SERVICE_UNAVAILABLE
        - GATEWAY_TIMEOUT
        - HTTP_VERSION_NOT_SUPPORTED
        - VARIANT_ALSO_NEGOTIATES
        - INSUFFICIENT_STORAGE
        - LOOP_DETECTED
        - BANDWIDTH_LIMIT_EXCEEDED
        - NOT_EXTENDED
        - NETWORK_AUTHENTICATION_REQUIRED
    # Adaptive Release
    AdaptiveReleaseRule:
      type: object
      properties:
        id:
          type: string
          description: Rule item identifier that indicates the id of the rule item source which the item was created from. (Ex. '_48_1')
          readOnly: true
        title:
          type: string
          description: Title given to the adaptive release rule
          maxLength: 100
    AdaptiveReleaseRuleCriterion:
      type: object
      properties:
        id:
          type: string
          description: Internal Identifier of the Rule's criteria
          readOnly: true
        type:
          type: string
          description: The Type of the Criterion
          enum:
            - GradeRange
            - GradePercentage
            - DateRange
            - Memberships
            - ContentComplete
            - GradeCompleted
            - ContentReviewed
      discriminator:
        propertyName: type
    AdaptiveReleaseRuleCriterion.GradeRange:
      allOf:
        - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion"
        - type: object
          properties:
            GradeColumnId:
              type: string
            maxScore:
              type: number
              format: float
              description: Should respect the grade scale chosen by the referenced gradebook column. Less than or equal to the max score set in the grade item
              nullable: true
            minScore:
              type: number
              format: float
              description: Only one of the scores can be set to null in a particular request. Cannot be negative
              minimum: 0
              nullable: true
    AdaptiveReleaseRuleCriterion.GradePercentage:
      allOf:
        - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion"
        - type: object
          properties:
            GradeColumnId:
              type: string
            maxScore:
              type: number
              format: float
              description: Should respect the grade scale chosen by the referenced gradebook column. Less than or equal to the max score set in the grade item
              minimum: 0
              maximum: 100
              nullable: true
            minScore:
              type: number
              format: float
              description: Only one of the scores can be set to null in a particular request. Cannot be negative
              minimum: 0
              maximum: 100
              nullable: true
    AdaptiveReleaseRuleCriterion.DateRange:
      allOf:
        - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion"
        - type: object
          properties:
            startDate:
              type: string
              format: date-time
              nullable: true
            endDate:
              type: string
              format: date-time
              nullable: true
    AdaptiveReleaseRuleCriterion.Memberships:
      allOf:
        # Doesn't include any specific fields but worth reserving the name
        - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion"
    # Anthology claims that this one isn't supported by the public API
    AdaptiveReleaseRuleCriterion.ContentComplete:
      allOf:
        - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion"
        - type: object
          properties:
            contentId:
              type: string
    AdaptiveReleaseRuleCriterion.GradeCompleted:
      allOf:
        - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion"
        - type: object
          properties:
            gradeColumnId:
              type: string
    AdaptiveReleaseRuleCriterion.ContentReviewed:
      allOf:
        - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion"
        - type: object
          properties:
            reviewedContentId:
              type: string
    # (System) Announcements
    SystemAnnouncement:
      type: object
      properties:
        id:
          type: string
          description: Primary key identifier
          readOnly: true
        title:
          type: string
          description: The title of this System Announcement.
        body:
          type: string
          format: BbML
          description: The message body of the System Announcement. This field supports BbML; see <a target='_blank' href='https://docs.anthology.com/docs/rest-apis/learn/advanced/bbml.html'>here</a> for more information.
        #availability:
        showAtLogin:
          type: boolean
          description: Whether this System Announcement should be displayed on the login page.
        showInCourses:
          type: boolean
          description: Whether this System Announcement should be displayed on courses.
        creatorUserId:
          type: string
          description: The user Id who created or last updated the System Announcement.
          readOnly: true
        created:
          type: string
          format: date-time
          description: The date that the System Announcement was created.
          readOnly: true
        modified:
          type: string
          format: date-time
          readOnly: true

  parameters:
    # Common
    includedFields:
      name: fields
      in: query
      description: A comma-delimited list of fields to include in the response. If not specified, all fields will be returned.
      required: false
      schema:
        type: string
    courseId:
      name: courseId
      in: path
      description: The course or organization ID.  This may be the primary ID, or any of the secondary IDs prefixed with the ID type.
      required: true
      schema:
        type: string
      examples:
        primaryId:
          summary: primary ID type
          value: "_123_1"
        externalId:
          summary: external ID type
          value: externalId:math101
        courseId:
          summary: course ID type
          value: courseId:math101
        uuid:
          summary: uuid ID type
          value: uuid:915c7567d76d444abf1eed56aad3beb5
    contentId:
      name: contentId
      in: path
      description: "The Content ID. This may be the primary ID, or any of the following keywords: interactive, indirect, root."
      required: true
      schema:
        type: string
      examples:
        primaryId:
          summary: primary ID type
          value: "_123_1"
        keyword:
          summary: Using one of the predefined keywords
          value: "root"
    ruleId:
      name: ruleId
      in: path
      description: The rule ID. This should be the primary ID.
      required: true
      schema:
        type: string
      example: _123_1
    criterionId:
      name: criterionId
      in: path
      description: The adaptive release criterion ID. This should be the primary ID.
      required: true
      schema:
        type: string
      example: _123_1
    # Paging
    paging.includePermissions:
      name: includePermissions
      in: query
      description: Flag to indicate whether to include permissions in the response.
      required: false
      schema:
        type: boolean
    paging.limit:
      name: limit
      in: query
      description: The maximum number of results to be returned. There may be less if the query returned less than the maximum.
      required: false
      schema:
        type: integer
        format: int32
    paging.offset:
      name: offset
      in: query
      description: The number of rows to skip before beginning to return rows. An offset of 0 is the same as omitting the offset parameter.
      required: false
      schema:
        type: integer
        format: int32
