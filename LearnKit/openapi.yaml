openapi: 3.0.4
info:
  title: "Learn APIs"
  version: 3900.121.0

servers:
  - url: "https://localhost/learn/api/public"
    description: Production Server

paths:
  # Oauth
  "/v1/oauth2/authorizationcode":
    get:
      deprecated: false
      tags:
        - oauth
      summary: Authorization Code
      description: >
        Requests an OAuth 2 authorization code. Use of PKCE standard is optional, but highly recommended.

        **Since**: 3200.7.0
      parameters:
        - name: redirect_uri
          in: query
          description: The redirectUri to send the end user to once an authorization code response is made in Oauth2 Authorization Code Workflow
          required: false
          schema:
            type: string
        - name: response_type
          in: query
          description: The response_type expected which must to be set to "code"
          required: true
          schema:
            type: string
            enum:
              - code
        - name: client_id
          in: query
          description: The client identifier for the registered application.
          required: true
          schema:
            type: string
        - name: scope
          in: query
          description: The space delimited scope(s) being requested for this authorization. Example value "read write offline"
          required: false
          schema:
            type: string
        - name: state
          in: query
          description: Opaque value used by client to maintain state between request and callback. Used to prevent cross-site request forgery.
          required: false
          schema:
            type: string
        - name: code_challenge
          in: query
          description: >
            A code challenge to verify credentials along with the granted authorization code. It is used with the PKCE standard.

            **Since**: 3700.4.0
          required: false
          schema:
            type: string
        - name: code_challenge_method
          in: query
          description: >
            This is the method used to verify the code challenge using the PKCE standard. Blackboard only supports s256 as the code challenge method.

            **Since**: 3700.4.0
          required: false
          schema:
            type: string
        - name: one_time_session_token
          in: query
          description: >
            Token used to retrieve the session that generated this Oauth2 Code request. Used when session cookies are not sent due to privacy settings of the browser.

            **Since**: 3900.13.0
          required: false
          schema:
            type: string

      responses:
        "200":
          description: OK
  "/v1/oauth2/token":
    post:
      deprecated: false
      tags:
        - oauth
      summary: Request Token
      description: >
        Requests an OAuth 2 access token.

        **Since**: 2015.11.0
      security:
        - bearerAuth: []

      requestBody:
        content:
          # TODO: There is no body accepted. But the docs specify it
          application/x-www-form-urlencoded:
            schema:

      parameters:
        - name: grant_type
          in: query
          description: The Grant Type.
          required: false
          schema:
            type: string
            enum:
              - client_credentials
              - authorization_code
              - refresh_token
        - name: code
          in: query
          description: The authorization code granted by an end user for use by an application in Oauth2 Authorization Code Workflow.
          required: false
          schema:
            type: string
        - name: redirect_uri
          in: query
          description: >
            The redirectUri to send the end user to once an access token response is made in Oauth2 Authorization Code Workflow.

            **Since**: 3200.7.0
          required: false
          schema:
            type: string
        - name: refresh_token
          in: query
          description: >
            The refresh token granted for use by an application in Oauth2 Refresh Token Workflow

            **Since**: 3200.7.0
          required: false
          schema:
            type: string
        - name: code_verifier
          in: query
          description: >
            The code_verifier to be passed along with authorization code if PKCE standard was used to grant the authorization code.

            **Since**: 3700.4.0
          required: false
          schema:
            type: string

      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - expires_in
                properties:
                  access_token:
                    type: string
                    description: The access token issued by the authorization server.
                  token_type:
                    type: string
                    description: The type of the token issued.  Value is case insensitive.
                  expires_in:
                    type: integer
                    format: int32
                    description: The lifetime in seconds of the access token.
                  refresh_token:
                    type: string
                    description: The refresh token issued by the authorization server during OAuth2 authorization code workflow if 'offline' scope was granted.
                  scope:
                    type: string
                    description: The scope of the access granted by this token.
                  user_id:
                    type: string
                    description: The ID of the user granted access via token
  "/v1/oauth2/tokeninfo":
    get:
      deprecated: false
      tags:
        - oauth
      summary: Get Token Info
      description: >
        Requests an OAuth 2 access token info.

        **Since**: 3700.6.0

      responses:
        "200":
          # TODO: Check this is correct
          description: Unnamed
          content:
            application/json:
              schema:

  # Adaptive Release
  "/v1/courses/{courseId}/contents/{contentId}/adaptiveRelease/rules":
    parameters:
      - $ref: "#/components/parameters/courseId"
      - $ref: "#/components/parameters/contentId"
      - $ref: "#/components/parameters/includedFields"
    get:
      deprecated: false
      tags:
        - adaptive release
      summary: Get Rules
      description: >
        Get all the adaptive release rules associated with the given content in the specified course. Users with all the following entitlements may access this resource:
          - course.adaptiverelease.VIEW
        The requesting user must also be enrolled in the course, or have the system.course.MODIFY entitlement.

        **Since**: 3900.23.0
      parameters:
        - $ref: "#/components/parameters/paging.includePermissions"
        - $ref: "#/components/parameters/paging.limit"
        - $ref: "#/components/parameters/paging.offset"
        - name: sort
          in: query
          description: "Properties to sort by. This is a comma-delimited list of JSON properties, with an optional \"(desc)\" suffix to request a descending sort for that property. e.g. \"title(desc)\" Supported fields are:\n\n- id\n- title\n\n**Since**: 3900.23.0"
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                # TODO: I'm like 99% sure this is actually wrong but they are SO unclear
                $ref: "#/components/schemas/AdaptiveReleaseRule"
                #type: object
                #properties:
                #  statusCode:
                #    $ref: "#/components/schemas/HttpStatus"
                #    readOnly: true
                #  statusCodeValue:
                #    type: integer
                #    format: int32
                #    readOnly: true
        "400":
          description: The supplied values are not correct
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
        "403":
          description: The current user is not entitled to perform this operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
        "404":
          description: The specified parameter is not associated to any existing resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
    post:
      deprecated: false
      tags:
        - adaptive release
      summary: Create Rule
      description: "Create a new adaptive release rule with the given title. Users with all the following entitlements may access this resource:\n\n- course.content.availability.MODIFY\n- course.adaptiverelease.CREATE\nThe requesting user must also be enrolled in the course, or have the system.course.MODIFY entitlement.\n\n**Since**: 3900.23.0"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: Title given to the adaptive release rule
                  maxLength: 100
              required:
                - title
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                # TODO: This probably returns an AdaptiveReleaseRule, but as you can guess UNDOCUMENTED
                # blackboard.platform.restspring.http.RestResponseEntity<blackboard.webapps.blackboard.publicapi.v1.adaptiveRelease.AdaptiveReleaseRuleV1>
                type: object
        "400":
          description: The supplied values are not correct
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
        "403":
          description: The current user is not entitled to perform this operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
        "404":
          description: The specified parameter is not associated to any existing resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
        "409":
          description: Cannot create multiple instances of the specified resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
  "/v1/courses/{courseId}/contents/{contentId}/adaptiveRelease/rules/{ruleId}":
    parameters:
      - $ref: "#/components/parameters/courseId"
      - $ref: "#/components/parameters/contentId"
      - $ref: "#/components/parameters/ruleId"
    get:
      deprecated: false
      tags:
        - adaptive release
      summary: Get Rule
      description: >
        Get the adaptive release rule associated with the given content in the specified course corresponding to the rule id. Users with all the following entitlements may access this resource:

          - course.adaptiverelease.VIEW
          The requesting user must also be enrolled in the course, or have the system.course.MODIFY entitlement.

        **Since**: 3900.23.0
      parameters:
        - $ref: "#/components/parameters/includedFields"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdaptiveReleaseRule"
        "400":
          description: The supplied values are not correct
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
        "403":
          description: The current user is not entitled to perform this operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
        "404":
          description: The specified parameter is not associated to any existing resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
    delete:
      deprecated: false
      tags:
        - adaptive release
      summary: Delete Rule
      description: >
        Delete an adaptive release rule. Users with all the following entitlements may access this resource:

        - course.content.availability.MODIFY
        - course.adaptiverelease.DELETE

        **Since**: 3900.28.0
      parameters:
        - $ref: "#/components/parameters/includedFields"
      responses:
        "204":
          description: No Content
        "400":
          description: The supplied values are not correct
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
        "403":
          description: The current user is not entitled to perform this operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
        "404":
          description: The specified parameter is not associated to any existing resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
    patch:
      deprecated: false
      tags:
        - adaptive release
      summary: Update Rule
      description: >
        Updates an adaptive release rule. Users with all the following entitlements may update this resource:

          - course.content.availability.MODIFY
          - course.adaptiverelease.MODIFY
          The requesting user must also be enrolled in the course, or have the system.course.MODIFY entitlement in order to update adaptive release rules.

          **Since**: 3900.28.0
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: Title given to the adaptive release rule
                  maxLength: 100
      parameters:
        - $ref: "#/components/parameters/includedFields"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdaptiveReleaseRule"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
  "/v1/courses/{courseId}/contents/{contentId}/adaptiveRelease/rules/{ruleId}/criteria":
    parameters:
      - $ref: "#/components/parameters/courseId"
      - $ref: "#/components/parameters/contentId"
      - $ref: "#/components/parameters/ruleId"
    get:
      deprecated: false
      tags:
        - adaptive release
      summary: Get Criteria
      description: >
        Get the criteria list from the adaptive release rule associated with the given content in the specified course corresponding to the rule id Users with all of the following entitlements may access this resource:

        - course.content.VIEW
        - course.adaptiverelease.VIEW
        Note: ACL criteria is not fully supported by this API.

        **Since**: 3900.23.0
      parameters:
        - $ref: "#/components/parameters/paging.offset"
        - $ref: "#/components/parameters/paging.includePermissions"
        - $ref: "#/components/parameters/paging.limit"
        - name: sort
          in: query
          description: >
            Properties to sort by. This is a comma-delimited list of JSON properties, with an optional "(desc)" suffix to request a descending sort for that property. e.g. "title(desc)" Supported fields are:

            - id

            **Since**: 3900.23.0
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                # TODO: Differs from web docs because fuck Anthology
                type: object
                properties:
                  results:
                    type: array
                    items:
                      anyOf:
                        - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradeRange"
                        - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradePercentage"
                        - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.DateRange"
                        - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.Memberships"
                        - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.ContentComplete"
                        - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradeCompleted"
                        - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.ContentReviewed"
                      discriminator:
                        propertyName: type
                        mapping:
                          GradeRange: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradeRange"
                          GradePercentage: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradePercentage"
                          DateRange: "#/components/schemas/AdaptiveReleaseRuleCriterion.DateRange"
                          Memberships: "#/components/schemas/AdaptiveReleaseRuleCriterion.Memberships"
                          ContentComplete: "#/components/schemas/AdaptiveReleaseRuleCriterion.ContentComplete"
                          GradeCompleted: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradeCompleted"
                          ContentReviewed: "#/components/schemas/AdaptiveReleaseRuleCriterion.ContentReviewed"
        "400":
          description: The supplied values are not correct
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
        "403":
          description: The current user is not entitled to perform this operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
        "404":
          description: The specified parameter is not associated to any existing resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
    post:
      deprecated: false
      tags:
        - adaptive release
      summary: Create Adaptive Release Rule Criteria
      description: >
        Create a new adaptive release rule criteria. Users with the following entitlements may create resources. For each criteria type the corresponding entitlement is checked:

        - course.adaptiverelease.CREATE
        - course.content.availability.MODIFY
        - course.adaptiverelease.acl.CREATE
        - course.adaptiverelease.dates.CREATE
        - course.adaptiverelease.performance.CREATE
        Note: ACL criteria is not fully supported by this API.

        **Since**: 3900.23.0
      requestBody:
        $ref: "#/components/requestBodies/AnyAdaptiveReleaseRuleCriterion"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradeRange"
                  - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradePercentage"
                  - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.DateRange"
                  - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.Memberships"
                  - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.ContentComplete"
                  - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradeCompleted"
                  - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.ContentReviewed"
                discriminator:
                  propertyName: type
                  mapping:
                    GradeRange: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradeRange"
                    GradePercentage: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradePercentage"
                    DateRange: "#/components/schemas/AdaptiveReleaseRuleCriterion.DateRange"
                    Memberships: "#/components/schemas/AdaptiveReleaseRuleCriterion.Memberships"
                    ContentComplete: "#/components/schemas/AdaptiveReleaseRuleCriterion.ContentComplete"
                    GradeCompleted: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradeCompleted"
                    ContentReviewed: "#/components/schemas/AdaptiveReleaseRuleCriterion.ContentReviewed"
        "400":
          description: The supplied values are not correct
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
        "403":
          description: The current user is not entitled to perform this operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
        "404":
          description: The specified parameter is not associated to any existing resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
        "409":
          description: Cannot create multiple instances of the specified resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
  "/v1/courses/{courseId}/contents/{contentId}/adaptiveRelease/rules/{ruleId}/criteria/{criterionId}":
    parameters:
      - $ref: "#/components/parameters/courseId"
      - $ref: "#/components/parameters/contentId"
      - $ref: "#/components/parameters/ruleId"
      - $ref: "#/components/parameters/criterionId"
    get:
      deprecated: false
      tags:
        - adaptive release
      summary: Get Adaptive Release Rule Criterion
      description: >
        Get a single criterion by the specified Id, from the adaptive release rule associated to the given content Users with all of the following entitlements may access this resource:

          - course.content.VIEW
          - course.adaptiverelease.VIEW
          Note: ACL criteria is not fully supported by this API.

          **Since**: 3900.23.0
      responses:
        "200":
          $ref: "#/components/responses/AnyAdaptiveReleaseRuleCriterion"
        "403":
          description: The current user is not entitled to perform this operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
        "404":
          description: The specified parameter is not associated to any existing resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
    delete:
      deprecated: false
      tags:
        - adaptive release
      summary: Delete Adaptive Release Rule Criterion
      description: >
        Delete a single criterion by the specified Id, from the adaptive release rule associated to the given content. Users with the following entitlements may delete the resource:

        - system.course.MODIFY
        - course.adaptiverelease.DELETE
        - course.content.availability.MODIFY
        User may need one of the following entitlements depending on the criterion being deleted:

        - course.adaptiverelease.acl.DELETE
        - course.adaptiverelease.dates.DELETE
        - course.adaptiverelease.performance.DELETE

        **Since**: 3900.28.0
      responses:
        "204":
          description: No Content
        "400":
          description: The supplied values are not correct
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
        "403":
          description: The current user is not entitled to perform this operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
        "404":
          description: The specified parameter is not associated to any existing resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
    patch:
      deprecated: false
      tags:
        - adaptive release
      summary: Update Adaptive Release Rule Criterion
      description: >
        Update a single criterion by the specified Id, from the adaptive release rule associated to the given content. Users with the following entitlements may update the resource:

        - system.course.MODIFY
        - course.adaptiverelease.MODIFY
        - course.content.availability.MODIFY
        User may need one of the following entitlements depending on the criterion being updated:

        - course.adaptiverelease.acl.MODIFY
        - course.adaptiverelease.dates.MODIFY
        - course.adaptiverelease.performance.MODIFY
        For updating criteria of type {@link GradeCompletedCriteria}, user may need any one of the following entitlements:

        - course.gradebook-metadata.VIEW
        - course.gradebook.MODIFY
        DateRange and DateRange criteria will behave differently if any of the range defining values are set to null, explicitly. For GradeRange criteria:

        - If maxScore is set to null, it will be understood as 'minScore or higher'.
        - minScore cannot be set to null, regardless of maxScore's value.
        For DateRange criteria:

        - If startDate is set to null, it will be understood as 'before endDate'.
        - If endDate is set to null, it will be understood as 'after startDate'.
        - At least one date must be valid.

        **Since**: 3900.28.0
      requestBody:
        $ref: "#/components/requestBodies/AnyAdaptiveReleaseRuleCriterion"
      responses:
        "200":
          $ref: "#/components/responses/AnyAdaptiveReleaseRuleCriterion"
        "400":
          description: The supplied values are not correct
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
        "403":
          description: The current user is not entitled to perform this operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
        "404":
          description: The specified parameter is not associated to any existing resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
        "409":
          description: Cannot create multiple instances of the specified resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
