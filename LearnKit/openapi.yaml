        - $ref: "#/components/parameters/paging.offset"
        - $ref: "#/components/parameters/paging.includePermissions"
        - $ref: "#/components/parameters/paging.limit"
        - $ref: "#/components/parameters/includedFields"
        - name: creatorUserId
          in: query
          description: >
            Search for announcements with creator user id equal to this value.

            **Since**: 3900.89.0.
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: string

  requestBodies:
