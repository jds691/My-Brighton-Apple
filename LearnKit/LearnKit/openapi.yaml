  # Content
  "/v1/courses/{courseId}/contents":
    parameters:
      - $ref: "#/components/parameters/courseId"
    get:
      deprecated: false
      tags:
        - content
      summary: Get Contents
      description: >
        List top-level content items in a course.

        Users with at least one of the following entitlements may access any content item:

        - course.adaptiverelease.CREATE
        - course.adaptiverelease.DELETE
        - course.adaptiverelease.MODIFY
        - course.adaptiverelease.VIEW
        - course.configure-areas.EXECUTE
        - course.content-item.copy.EXECUTE
        - course.content.DELETE
        - course.content.MODIFY
        - course.learningstandards.alignment.CREATE
        - course.performance.dashboard.VIEW
        </p>

        For other users, permission to view the content item will depend on the availability settings of the course and  the content item.  The following fields will be filtered out:

        - availability.available
        - availability.allowGuests
        - availability.adaptiveRelease
        </p>

        **Since**: 3000.1.0
      parameters:
        - $ref: "#/components/parameters/paging.offset"
        - $ref: "#/components/parameters/paging.includePermissions"
        - $ref: "#/components/parameters/paging.limit"
        - $ref: "#/components/parameters/includedFields"
        - name: recursive
          in: query
          description: >
            Search for child content recursively.  A value of 'true' indicates that search results should include all content descendants within the hierarchy of the specified parent.  A value of 'false' indicates results should be limited to immediate children only.  Not setting this field defaults to 'false' behavior; only including immediate children.

            **Since**: 3100.2.0
          required: false
          schema:
            type: boolean
        - name: title
          in: query
          description: >
            Search for content title. Will return all Content items whose title contains the supplied search value.

            **Since**: 3900.10.0
          required: false
          schema:
            type: string
        - name: contentHandler
          in: query
          description: >
            Search for the specific content handler.  Not setting this field will return all content handlers.

            **Since**: 3400.5.0
          required: false
          schema:
            type: string
        - name: created
          in: query
          description: >
            Search for contents with a created date relative to this value.  'createdCompare' may also be sent to control search behavior.

            **Since**: 3700.1.0
          required: false
          schema:
            type: string
            format: date-time
        - name: createdCompare
          in: query
          description: >
            Used alongside the 'created' search parameter.  Supported values:

            - lessThan
            - greaterOrEqual

            Defaults to greaterOrEqual if not specified.

            **Since**: 3700.1.0


            | Type      | Description
            | --------- | --------- |
            | lessThan |  |
            | greaterOrEqual |  |
          required: false
          schema:
            type: string
            enum:
              - lessThan
              - greaterOrEqual
        - name: modified
          in: query
          description: >
            Search for contents with a modified date relative to this value.  'modifiedCompare' may also be sent to control search behavior.

            **Since**: 3700.4.0
          required: false
          schema:
            type: string
            format: date-time
        - name: modifiedCompare
          in: query
          description: >
            Used alongside the 'modified' search parameter.  Supported values:

            - lessThan
            - greaterOrEqual

            Defaults to greaterOrEqual if not specified.

            **Since**: 3700.4.0


            | Type      | Description
            | --------- | --------- |
            | lessThan |  |
            | greaterOrEqual |  |

          schema:
            type: string
            enum:
              - lessThan
              - greaterOrEqual
        - name: reviewable
          in: query
          description: >
            Search contents by whether they are reviewable or not.

            **Since**: 3700.15.0
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                # TODO: Differs from web docs because fuck Anthology
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/Content"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"

  # Courses
  "/v3/courses":
    get:
      deprecated: false
      tags:
        - courses
      summary: Get Courses
      description: >
        Returns a list of courses and organizations.

        To view disabled courses a user must have the entitlement 'system.course.VIEW'.
        Users with the 'course.configure-properties.EXECUTE' course entitlement, or the 'system.course.properties.MODIFY' system entitlement can access all course properties.

        Users enrolled in the course have read access to all properties except:

        - uuid
        - externalId
        - dataSourceId
        - created
        - allowGuests
        - enrollment.accessCode
        Users who are not enrolled in the course and do not have associated entitlements only have read access to the following properties:

        - id
        - courseId
        - name
        - description
        - organization
        - readOnly
        - termId
        - availability.available
        - availability.duration.type
        - availability.duration.start
        - availability.duration.end
        - availability.duration.daysOfUse
        When courses are child courses, parent course data is also returned to provide a complete data representation of course relationships.

        If the course enrollment is self-enroll, all users can view the course as though they were enrolled.

        **Since**: 3800.1.0
      parameters:
        - $ref: "#/components/parameters/paging.offset"
        - $ref: "#/components/parameters/paging.includePermissions"
        - $ref: "#/components/parameters/paging.limit"
        - $ref: "#/components/parameters/includedFields"
        - name: modified
          in: query
          description: >
            Search for courses with a modified date relative to this value.  'modifiedCompare' may also be sent to control search behavior.

            **Since**: 3500.4.0
          required: false
          schema:
            type: string
            format: date-time
        - name: modifiedCompare
          in: query
          description: >
            Used alongside the 'modified' search parameter. Defaults to greaterOrEqual if not specified.

            **Since**: 3500.4.0


            | Type      | Description
            | --------- | --------- |
            | lessThan |  |
            | greaterOrEqual |  |
          required: false
          schema:
            type: string
            enum:
              - lessThan
              - greaterOrEqual
        - name: courseId
          in: query
          description: >
            Search for courses with courseId properties that contain this value.

            **Since**: 3100.0.0
          required: false
          schema:
            type: string
        - name: name
          in: query
          description: >
            Search for courses with name properties that contain this value.

            **Since**: 3100.0.0
          required: false
          schema:
            type: string
        - name: description
          in: query
          description: >
            Search for courses with description properties that contain this value.

            **Since**: 3100.0.0
          required: false
          schema:
            type: string
        - name: externalId
          in: query
          description: >
            Search for courses with externalId properties that contain this value.

            **Since**: 3100.0.0
          required: false
          schema:
            type: string
        - name: created
          in: query
          description: >
            Search for courses with a created date relative to this value.  'createdCompare' may also be sent to control search behavior.

            **Since**: 3100.0.0
          required: false
          schema:
            type: string
            format: date-time
        - name: allowGuests
          in: query
          description: >
            Search for courses which are configured to allow/disallow guest access, based on input.  Default: n/a (return courses regardless of guests allowed)

            **Since**: 3200.3.0
          required: false
          schema:
            type: boolean
        - name: createdCompare
          in: query
          description: >
            Used alongside the 'created' search parameter.  Defaults to greaterOrEqual if not specified.

            **Since**: 3100.0.0


            | Type      | Description
            | --------- | --------- |
            | lessThan |  |
            | greaterOrEqual |  |

          required: false
          schema:
            type: string
            enum:
              - lessThan
              - greaterOrEqual
        - name: availability.available
          in: query
          description: >
            Search for courses with availability.available properties that contain this value.

            **Since**: 3000.13.0


            | Type      | Description
            | --------- | --------- |
            | Yes | Students may access the course. |
            | No | Students may not access the course. |
            | Disabled | Disabled by the SIS. Students may not access the course.  **Since**: 3100.0.0 |
            | Term | Availability is inherited from the term settings. Requires a termId be set. |

          required: false
          schema:
            type: string
            enum:
              - Yes
              - No
              - Disabled
              - Term
        - name: dataSourceId
          in: query
          description: >
            Search for courses with this dataSourceId.  This may optionally be the data source's externalId using the syntax "externalId:math101".

            **Since**: 3100.0.0
          required: false
          schema:
            type: string
        - name: termId
          in: query
          description: >
            Search for courses with this termId.  This may optionally be the term's externalId using the syntax "externalId:spring2015".

            **Since**: 3100.0.0
          required: false
          schema:
            type: string
        - name: organization
          in: query
          description: >
            Search for courses by organization flag.  A value of 'true' indicates that search results should be limited to only Organizations.  A value of 'false' indicates results should be limited to Courses.  Not setting this field indicates that both Courses and Organizations should be returned.

            **Since**: 3100.0.0
          required: false
          schema:
            type: boolean
        - name: sort
          in: query
          description: >
            Properties to sort by. This is a comma-delimited list of JSON properties, with an optional "(desc)" suffix to request a descending sort for that property. e.g. "name(desc),created" Supported fields are:

            - courseId
            - name
            - externalId
            - created
            - modified

            **Since**: 3400.8.0
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                # TODO: Differs from web docs because fuck Anthology
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/Course"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
  "/v3/courses/{courseId}":
    parameters:
      - $ref: "#/components/parameters/courseId"
    get:
      deprecated: false
      tags:
        - courses
      summary: Get Course
      description: >
        Loads a specific course or organization.

        To view disabled courses a user must have the entitlement 'system.course.VIEW'.

        Users with the 'course.configure-properties.EXECUTE' entitlement can access all course properties.

        Users enrolled in the course have read access to all properties except:
        - uuid
        - externalId
        - dataSourceId
        - created
        - allowGuests
        - enrollment.accessCode

        Users with no access to the course only have read access to the following properties:

        - id
        - courseId
        - name
        - description
        - organization
        - closedComplete
        - termId
        - availability.available
        - availability.duration.type
        - availability.duration.start
        - availability.duration.end
        - availability.duration.daysOfUse
        If the course enrollment is self-enroll, all users can view the course as though they were enrolled.

        **Since**: 3800.1.0
      parameters:
        - $ref: "#/components/parameters/includedFields"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "400":
          description: Failed to create course; or The request did not specify a valid courseId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
        "404":
          description: The course is not found or is unavailable and the user does not have the permission to view unavailable courses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"

  # Terms
  "/v1/terms":
    get:
      deprecated: false
      tags:
        - terms
      summary: Get Terms
      description: >
        Returns a list of terms.

        Properties returned for each term will depend on whether or not the caller has one of the term entitlements.

        Callers without either the entitlements 'term.VIEW' or 'term.MODIFY' will always get a minimal set of core properties:

        - id
        - name
        - description
        - availability.*

        If the user has one of the entitlements, they will also get the following properties:

        - externalId
        - dataSourceId

        **Since**: 3000.1.0
      parameters:
        - $ref: "#/components/parameters/paging.offset"
        - $ref: "#/components/parameters/paging.includePermissions"
        - $ref: "#/components/parameters/paging.limit"
        - $ref: "#/components/parameters/includedFields"
        - name: externalId
          in: query
          description: >
            Search for term with externalId properties that contain this value.

            **Since**: 3100.6.0
          required: false
          schema:
            type: string
        - name: dataSourceId
          in: query
          description: >
            Search for term with this dataSourceId.

            **Since**: 3100.6.0
          required: false
          schema:
            type: string
        - name: availability.available
          in: query
          description: >
            Search for users with availability.available properties that contain this value.

            **Since**: 3100.6.0


            | Type      | Description
            | --------- | --------- |
            | Yes | Students may access the term and the courses it contains. |
            | No | Students may not access the term or the courses it contains. |

          required: false
          schema:
            type: string
            enum:
              - Yes
              - No
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                # TODO: Differs from web docs because fuck Anthology
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/Term"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
  "/v1/terms/{termId}":
    parameters:
      - $ref: "#/components/parameters/termId"
    get:
      deprecated: false
      tags:
        - terms
      summary: Get Term
      description: >
        Loads a term.

        Properties returned will depend on whether or not the caller has one of the term entitlements.

        Callers without either the entitlements 'term.VIEW' or 'term.MODIFY' will always get a minimal set of core properties:

        - id
        - name
        - description
        - availability.*

        If the user has one of the entitlements, they will also get the following properties:

        - externalId
        - dataSourceId

        **Since**: 2015.11.0
      parameters:
        - $ref: "#/components/parameters/includedFields"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Term"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestException"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: string

  requestBodies:
    AnyAdaptiveReleaseRuleCriterion:
      required: true
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradeRange"
              - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradePercentage"
              - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.DateRange"
              - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.Memberships"
              - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.ContentComplete"
              - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradeCompleted"
              - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.ContentReviewed"
            discriminator:
              propertyName: type
              mapping:
                GradeRange: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradeRange"
                GradePercentage: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradePercentage"
                DateRange: "#/components/schemas/AdaptiveReleaseRuleCriterion.DateRange"
                Memberships: "#/components/schemas/AdaptiveReleaseRuleCriterion.Memberships"
                ContentComplete: "#/components/schemas/AdaptiveReleaseRuleCriterion.ContentComplete"
                GradeCompleted: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradeCompleted"
                ContentReviewed: "#/components/schemas/AdaptiveReleaseRuleCriterion.ContentReviewed"

  responses:
    AnyAdaptiveReleaseRuleCriterion:
      description: OK
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradeRange"
              - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradePercentage"
              - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.DateRange"
              - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.Memberships"
              - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.ContentComplete"
              - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradeCompleted"
              - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion.ContentReviewed"
            discriminator:
              propertyName: type
              mapping:
                GradeRange: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradeRange"
                GradePercentage: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradePercentage"
                DateRange: "#/components/schemas/AdaptiveReleaseRuleCriterion.DateRange"
                Memberships: "#/components/schemas/AdaptiveReleaseRuleCriterion.Memberships"
                ContentComplete: "#/components/schemas/AdaptiveReleaseRuleCriterion.ContentComplete"
                GradeCompleted: "#/components/schemas/AdaptiveReleaseRuleCriterion.GradeCompleted"
                ContentReviewed: "#/components/schemas/AdaptiveReleaseRuleCriterion.ContentReviewed"

  schemas:
    # Common
    RestException:
      type: object
      properties:
        status:
          type: string
          description: Represents HTTP Status code in the response header.
        code:
          type: string
          description: The error code specific to a particular REST API. It is usually something that conveys information specific to the problem domain. For cases where the HTTP Status code conveys all the information required (such as a 404-Not Found) then the code may be omitted.
        message:
          type: string
          description: Error message that should be easy to understand and convey a concise reason as to why the error occurred.
        developerMessage:
          type: string
          description: Represents any technical information that a developer calling REST API might find useful.
        extraInfo:
          type: string
          description: Indicates a URL that anyone seeing the error message can click in a browser. The target web page should describe the error condition fully, as well as potential solutions to help them resolve the error condition.
      required:
        - message
    HttpStatus:
      type: string
      enum:
        - CONTINUE
        - SWITCHING_PROTOCOLS
        - PROCESSING
        - CHECKPOINT
        - OK
        - CREATED
        - ACCEPTED
        - NON_AUTHORITATIVE_INFORMATION
        - NO_CONTENT
        - RESET_CONTENT
        - PARTIAL_CONTENT
        - MULTI_STATUS
        - ALREADY_REPORTED
        - IM_USED
        - MULTIPLE_CHOICES
        - MOVED_PERMANENTLY
        - FOUND
        - MOVED_TEMPORARILY
        - SEE_OTHER
        - NOT_MODIFIED
        - USE_PROXY
        - TEMPORARY_REDIRECT
        - PERMANENT_REDIRECT
        - BAD_REQUEST
        - UNAUTHORIZED
        - PAYMENT_REQUIRED
        - FORBIDDEN
        - NOT_FOUND
        - METHOD_NOT_ALLOWED
        - NOT_ACCEPTABLE
        - PROXY_AUTHENTICATION_REQUIRED
        - REQUEST_TIMEOUT
        - CONFLICT
        - GONE
        - LENGTH_REQUIRED
        - PRECONDITION_FAILED
        - PAYLOAD_TOO_LARGE
        - REQUEST_ENTITY_TOO_LARGE
        - URI_TOO_LONG
        - REQUEST_URI_TOO_LONG
        - UNSUPPORTED_MEDIA_TYPE
        - REQUESTED_RANGE_NOT_SATISFIABLE
        - EXPECTATION_FAILED
        - I_AM_A_TEAPOT
        - INSUFFICIENT_SPACE_ON_RESOURCE
        - METHOD_FAILURE
        - DESTINATION_LOCKED
        - UNPROCESSABLE_ENTITY
        - LOCKED
        - FAILED_DEPENDENCY
        - TOO_EARLY
        - UPGRADE_REQUIRED
        - PRECONDITION_REQUIRED
        - TOO_MANY_REQUESTS
        - REQUEST_HEADER_FIELDS_TOO_LARGE
        - UNAVAILABLE_FOR_LEGAL_REASONS
        - INTERNAL_SERVER_ERROR
        - NOT_IMPLEMENTED
        - BAD_GATEWAY
        - SERVICE_UNAVAILABLE
        - GATEWAY_TIMEOUT
        - HTTP_VERSION_NOT_SUPPORTED
        - VARIANT_ALSO_NEGOTIATES
        - INSUFFICIENT_STORAGE
        - LOOP_DETECTED
        - BANDWIDTH_LIMIT_EXCEEDED
        - NOT_EXTENDED
        - NETWORK_AUTHENTICATION_REQUIRED
    # Adaptive Release
    AdaptiveReleaseRule:
      type: object
      properties:
        id:
          type: string
          description: Rule item identifier that indicates the id of the rule item source which the item was created from. (Ex. '_48_1')
          readOnly: true
        title:
          type: string
          description: Title given to the adaptive release rule
          maxLength: 100
    AdaptiveReleaseRuleCriterion:
      type: object
      properties:
        id:
          type: string
          description: Internal Identifier of the Rule's criteria
          readOnly: true
        type:
          type: string
          description: The Type of the Criterion
          enum:
            - GradeRange
            - GradePercentage
            - DateRange
            - Memberships
            - ContentComplete
            - GradeCompleted
            - ContentReviewed
      discriminator:
        propertyName: type
    AdaptiveReleaseRuleCriterion.GradeRange:
      allOf:
        - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion"
        - type: object
          properties:
            GradeColumnId:
              type: string
            maxScore:
              type: number
              format: float
              description: Should respect the grade scale chosen by the referenced gradebook column. Less than or equal to the max score set in the grade item
              nullable: true
            minScore:
              type: number
              format: float
              description: Only one of the scores can be set to null in a particular request. Cannot be negative
              minimum: 0
              nullable: true
    AdaptiveReleaseRuleCriterion.GradePercentage:
      allOf:
        - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion"
        - type: object
          properties:
            GradeColumnId:
              type: string
            maxScore:
              type: number
              format: float
              description: Should respect the grade scale chosen by the referenced gradebook column. Less than or equal to the max score set in the grade item
              minimum: 0
              maximum: 100
              nullable: true
            minScore:
              type: number
              format: float
              description: Only one of the scores can be set to null in a particular request. Cannot be negative
              minimum: 0
              maximum: 100
              nullable: true
    AdaptiveReleaseRuleCriterion.DateRange:
      allOf:
        - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion"
        - type: object
          properties:
            startDate:
              type: string
              format: date-time
              nullable: true
            endDate:
              type: string
              format: date-time
              nullable: true
    AdaptiveReleaseRuleCriterion.Memberships:
      allOf:
        # Doesn't include any specific fields but worth reserving the name
        - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion"
    # Anthology claims that this one isn't supported by the public API
    AdaptiveReleaseRuleCriterion.ContentComplete:
      allOf:
        - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion"
        - type: object
          properties:
            contentId:
              type: string
    AdaptiveReleaseRuleCriterion.GradeCompleted:
      allOf:
        - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion"
        - type: object
          properties:
            gradeColumnId:
              type: string
    AdaptiveReleaseRuleCriterion.ContentReviewed:
      allOf:
        - $ref: "#/components/schemas/AdaptiveReleaseRuleCriterion"
        - type: object
          properties:
            reviewedContentId:
              type: string
    # (System) Announcements
    SystemAnnouncement:
      type: object
      properties:
        id:
          type: string
          description: Primary key identifier
          readOnly: true
        title:
          type: string
          description: The title of this System Announcement.
        body:
          type: string
          format: BbML
          description: The message body of the System Announcement. This field supports BbML; see <a target='_blank' href='https://docs.anthology.com/docs/rest-apis/learn/advanced/bbml.html'>here</a> for more information.
        #availability:
        showAtLogin:
          type: boolean
          description: Whether this System Announcement should be displayed on the login page.
        showInCourses:
          type: boolean
          description: Whether this System Announcement should be displayed on courses.
        creatorUserId:
          type: string
          description: The user Id who created or last updated the System Announcement.
          readOnly: true
        created:
          type: string
          format: date-time
          description: The date that the System Announcement was created.
          readOnly: true
        modified:
          type: string
          format: date-time
          readOnly: true
    # Content
    # TODO: This is likely incorrect
    ContentLink:
      type: object
      properties:
        href:
          type: string
        rel:
          type: string
        title:
          type: string
        type:
          type: string
    ContentHandler:
      type: object
      properties:
        id:
          type: string
          description: >
            The content handler's ID.

            Publicly supported handlers:

            | ID                                 | Documentation                   | Since     |
            |------------------------------------|---------------------------------|-----------|
            | resource/x-bb-document             | ContentItemTOPubV1              |  3000.1.0 |
            | resource/x-bb-externallink         | ExternalLinkTOPubV1             |  3000.1.0 |
            | resource/x-bb-folder               | ContentFolderTOPubV1            |  3000.1.0 |
            | resource/x-bb-courselink           | CourseLinkTOPubV1               |  3100.5.0 |
            | resource/x-bb-forumlink            | DiscussionLinkTOPubV1           |  3100.6.0 |
            | resource/x-bb-blti-link            | BasicLTITOPubV1                 |  3200.6.0 |
            | resource/x-bb-file                 | ContentFileTOPubV1              |  3200.6.0 |
            | resource/x-bb-asmt-test-link       | TestLinkTOPubV1                 |  3300.5.0 |
            | resource/x-bb-assignment           | AssignmentTOPubV1               |  3400.9.0 |
            | resource/x-bb-blti-bltiplacement-* | BasicLTIPlacementContentTOPubV1 |  3600.0.0 |


            For handlers that are not publicly supported yet, their ID will be shown here, and updates to common content attributes are allowed, but extended handler-specific attributes will not be visible.
          readOnly: true
    Content:
      type: object
      properties:
        id:
          type: string
          description: The ID of the content.
          readOnly: true
        parentId:
          type: string
          # Whyyyyyyyy did they do this, it never gets set to null in a GET just *some* ID
          description: The ID of the content's parent.  Note that top-level contents do not have parents. The 'parentId' field is a writable field as of the Bb Learn 3200.6.0 release.  Specifying a new value in PATCH requests allows the Content object to be moved from one parent to another.
        title:
          type: string
          description: The title or name of this content. Typically shown as the main text to click in the course outline when accessing the content.
        body:
          type: string
          format: BbML
          description: The body text associated with this content. This field supports BbML; see <a target='_blank' href='https://docs.anthology.com/docs/rest-apis/learn/advanced/bbml.html'>here</a> for more information.
        description:
          type: string
          description: >
            The short description of this content.

            This field is not used in Classic courses.  For Ultra courses this is used to show information directly on the course outline.
          maxLength: 750
        created:
          type: string
          format: date-time
          description: The date this content was created.
          readOnly: true
        modified:
          type: string
          format: date-time
          description: >
            The date this content was modified.

            **Since**: 3700.4.0
          readOnly: true
        position:
          type: integer
          format: int32
          description: The position of this content within its parent folder. Position values are zero-based (the first element has a position value of zero, not one). Default position is last in the list of child contents under the parent.
        hasChildren:
          type: boolean
          description: Indicates whether this content is allowed to have child content items.
          readOnly: true
        hasGradebookColumns:
          type: boolean
          description: >
            Indicates whether this content item has one or more gradebook columns.

            Associated gradebook columns can be accessed via /learn/api/public/v1/courses/$courseId/gradebook/columns?contentId=$contentId

            **Since**: 3000.11.0
          readOnly: true
        hasAssociatedGroups:
          type: boolean
          description: >
            Indicates whether this content item has one or more associated groups.

            Associated groups can be accessed via /learn/api/public/v1/courses/$courseId/contents/$contentId/groups

            **Since**: 3100.4.0
        launchInNewWindow:
          type: boolean
          description: >
            Indicates whether the content is going to open in a new window.

            **Since**: 3800.10.0
        reviewable:
          type: boolean
          description: >
            Indicates whether Review Status is enabled for this content. Content items with review status enabled can be marked as reviewed by students in classic courses and content items with review status enabled in Ultra are either in a Forced Sequence or content that should be counted towards the progress tracking feature as of 3900.19 This can be used to track performance and in Adaptive Release rules to control the release of other content.

            **Since**: 3700.15.0
        availability:
          type: object
          description: Settings controlling availability of the content to students.
          title: Content.Availability
          properties:
            available:
              type: string
              description: >
                Whether the content is currently available to students.  Instructors can always access the content.  If set to 'PartiallyVisible', the title will be available to students but the body will not.  Defaults to Yes.


                | Type      | Description
                | --------- | --------- |
                | Yes |  |
                | No |  |
                | PartiallyVisible |  |
              enum:
                - Yes
                - No
                - PartiallyVisible
            allowGuests:
              type: boolean
              description: Whether this content is available to users with the 'guest' role. Defaults to true.
            allowObservers:
              type: boolean
              description: >
                Whether or not "observers" are allowed access to this Content. Defaults to true.

                **Since**: 3900.31.0
            adaptiveRelease:
              type: object
              description: Settings controlling adaptive release of the content to students.
              title: Content.Availability.AdaptiveRelease
              properties:
                start:
                  type: string
                  format: date-time
                  description: The date when this content will become available to students.
                end:
                  type: string
                  format: date-time
                  description: The date when this content will no longer be available to students.
        contentHandler:
          description: Extended settings specific to this content item's content handler.
          $ref: "#/components/schemas/ContentHandler"
        # TODO: Replace with array
        copyHistory:
          description: A list of Content History entities in representation of the copy process the current content item might have if is an LTI content, ordered from newest to oldest content and its respective source course from which current object is a copy of.
          type: object
        links:
          description: >
            A list of links to resources related to this content item. Supported relation types include:

            - alternate

            **Since**: 3900.0.0
          type: array
          items:
            $ref: "#/components/schemas/ContentLink"
        subtype:
          type: string
          description: Optional assessment subtype for further differentiation. For example, a test can have the subtype 'assignment' in Ultra, alongside AI conversations and knowledge checks, ensuring type-agnostic categorization.
    # Courses
    Course:
      type: object
      properties:
        id:
          type: string
          description: The primary ID of the course.
          readOnly: true
        uuid:
          type: string
          description: A secondary unique ID for the course. Used by LTI launches and other inter-service operations.
          readOnly: true
          maxLength: 32
        externalId:
          type: string
          description: >
            An optional externally-defined unique ID for the course. Defaults to the courseId.

            Formerly known as 'batchUid'.
        dataSourceId:
          type: string
          description: The ID of the data source associated with this course. This may optionally be the data source's externalId using the syntax "externalId:math101".
        courseId:
          type: string
          description: The Course ID attribute, shown to users in the UI.
          readOnly: true
          maxLength: 100
        name:
          type: string
          description: The name of the course.
          maxLength: 333
        description:
          type: string
          description: The description of the course.
        created:
          type: string
          format: date-time
          description: The date this course was created.
          readOnly: true
        modified:
          type: string
          format: date-time
          description: >
            The date this course was last modified.

            **Since**: 3500.4.0
          readOnly: true
        organization:
          type: boolean
          description: Whether this object represents an Organization. Defaults to false.
          readOnly: true
        ultraStatus:
          type: string
          description: >
            Whether the course is rendered using Classic or Ultra Course View.


            | Type      | Description
            | --------- | --------- |
            | Undecided | The ultra status is not decided. |
            | Classic | The course is decided as classic. |
            | Ultra | The course is decided as ultra |
            | Ultrapreview | The course is currently in Ultra mode but during the preview state where it may still be reverted via a Restore to the classic state |

          readOnly: true
          enum:
            - Undecided
            - Classic
            - Ultra
            - Ultrapreview
        allowGuests:
          type: boolean
          description: Whether guests (users with the role guest) are allowed access to the course. Modifiable only for Classic course. Defaults to {@code true} for Classic Courses and {@code false} for Ultra Courses.
        allowObservers:
          type: boolean
          description: >
            Whether observers are allowed access to the course. Modifiable only for Classic course. Defaults to {@code false}.

            **Since**: 3900.31.0
        closedComplete:
          type: boolean
          description: This status does not affect availability of the course for viewing in any way. closedComplete is valid for both Ultra and Classic courses. If an Ultra course is in closedComplete mode, updates are not possible. For a Classic course in closedComplete mode, updates are still possible (through Web UI but not through REST i.e. closed is enforced for original courses when updated through REST the same way Ultra courses are blocked) but new notifications are not generated.
        termId:
          type: string
          description: The ID of the term associated to this course. This may optionally be the term's externalId using the syntax "externalId:spring.2016".
        availability:
          type: object
          description: Settings controlling availability of the course to students.
          title: Course.Availability
          properties:
            available:
              type: string
              description: >
                Whether the course is currently available to students. Instructors can always access the course if they have 'Access unavailable course' entitlement. If set to 'Term', the course's parent term availability settings will be used.


                | Type      | Description
                | --------- | --------- |
                | Yes | Students may access the course. |
                | No | Students may not access the course. |
                | Disabled | Disabled by the SIS. Students may not access the course. @since 3100.0.0 |
                | Term | Availability is inherited from the term settings. Requires a termId be set. |
              enum:
                - Yes
                - No
                - Disabled
                - Term
            # TODO: Clean this up similarly to how AvailabiltyRules were defined for Adaptive Release
            duration:
              type: object
              description: Settings controlling the length of time the course is available.
              title: Course.Availability.Duration
              properties:
                type:
                  type: string
                  description: >
                    The intended length of the course. Possible values are:

                    - Continuous: The course is active on an ongoing basis. This is the default.
                    - DateRange: The course will only be available between specific date ranges.
                    - FixedNumDays: The course will only be available for a set number of days.
                    - Term: The course's parent term duration settings will be used.


                    | Type      | Description
                    | --------- | --------- |
                    | Continuous | Course is active on an ongoing basis. |
                    | DateRange | Course is only intended to be available between specific date ranges |
                    | FixedNumDays | Course is only available for a set number of days |
                    | UseTerm | Course availablity is dictated by its associated term |

                  enum:
                    - Continuous
                    - DateRange
                    - FixedNumDays
                    - UseTerm
                start:
                  type: string
                  format: date-time
                  description: The date this course starts. May only be set if availability.duration.type is DateRange.
                end:
                  type: string
                  format: date-time
                  description: The date this course ends. May only be set if availability.duration.type is DateRange.
                daysOfUse:
                  type: integer
                  format: int32
                  description: The number of days this course can be used. May only be set if availability.duration.type is FixedNumDays.
        enrollment:
          type: object
          description: Settings controlling how students may enroll in the course.
          title: Course.Enrollment
          properties:
            type:
              type: string
              description: >
                Specifies the enrollment options for the course. Defaults to InstructorLed.


                | Type      | Description
                | --------- | --------- |
                | InstructorLed | Enrollment tasks for the course can only performed by the instructor |
                | SelfEnrollment | Instructors have the ability to enroll users, and students can also enroll themselves in the course |
                | EmailEnrollment | Instructors have the ability to enroll users, and students can email requests to the instructor for enrollment |

              enum:
                - InstructorLed
                - SelfEnrollment
                - EmailEnrollment
            start:
              type: string
              format: date-time
              description: The date on which enrollments are allowed for the course. May only be set if enrollment.type is SelfEnrollment.
            end:
              type: string
              format: date-time
              description: The date on which enrollment in this course ends. May only be set if enrollment.type is SelfEnrollment.
            accessCode:
              type: string
              description: The enrollment access code associated with this course. May only be set if enrollment.type is SelfEnrollment.
              maxLength: 50
        locale:
          type: object
          description: Settings controlling localization within the course.
          title: Course.Locale
          properties:
            id:
              type: string
              description: The locale of this course.
              maxLength: 20
            force:
              type: boolean
              description: Whether students are forced to use the course's specified locale.
        hasChildren:
          type: boolean
          description: >
            Whether the course has any cross-listed children.

            **Since**: 3000.11.0
        parentId:
          type: string
          description: >
            The cross-listed parentId associated with the course, if the course is a child course.

            **Since**: 3000.11.0
        externalAccessUrl:
          type: string
          # TODO: See if the OpenAPI generator actually uses this
          format: url
          description: >
            A URL corresponding to the Course Page for the course.  Formatting varies based on whether the course is rendered using Classic or Ultra Course View

            **Since**: 3200.3.0
          readOnly: true
        guestAccessUrl:
          type: string
          format: url
          description: >
            A URL for viewing the Course Page for the course as a guest.  Formatting varies based on whether the course is rendered using Classic or Ultra Course View

            **Since**: 3200.3.0
          readOnly: true
        copyHistory:
          type: object
          # TODO: Figure out wtf this actually is
          description: List of source courses UUIDs, populated only if the current course was created as the result of a course copy.
    # Terms
    Term:
      type: object
      properties:
        id:
          type: string
          description: The primary ID of the term.
          readOnly: true
        externalId:
          type: string
          description: >
            An externally-defined unique ID for the term.

            Formerly known as 'sourcedidId'.
          maxLength: 256
        dataSourceId:
          type: string
          description: The ID of the data source associated with this term.  This may optionally be the data source's externalId using the syntax "externalId:math101".
        name:
          type: string
          description: The name of the term.
          maxLength: 333
        description:
          type: string
          format: BbML
          description: The description of the term. This field supports BbML; see <a target='_blank' href='https://docs.anthology.com/docs/rest-apis/learn/advanced/bbml.html'>here</a> for more information.
          example: "<!-- {\"bbMLEditorVersion\":1} --><div data-bbid=\"bbml-editor-id_9c6a9556-80a5-496c-b10d-af2a9ab22d45\"> <h4>Header Large</h4>  <h5>Header Medium</h5>  <h6>Header Small</h6>  <p><strong>Bold&nbsp;</strong><em>Italic&nbsp;<span style=\"text-decoration: underline;\">Italic Underline</span></em></p> <ul>   <li><span style=\"text-decoration: underline;\"><em></em></span>Bullet 1</li>  <li>Bullet 2</li> </ul> <p>  <img src=\"@X@EmbeddedFile.requestUrlStub@X@bbcswebdav/xid-1217_1\">   <span>\"Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.\"</span> </p>  <p><span>&lt;braces test=\"values\" other=\"strange things\"&gt;</span></p> <p>Header Small</p> <ol>   <li>Number 1</li>   <li>Number 2</li> </ol>  <p>Just words followed by a formula</p>  <p><img align=\"middle\" alt=\"3 divided by 4 2 root of 7\" class=\"Wirisformula\" src=\"@X@EmbeddedFile.requestUrlStub@X@sessions/EA5F7FF3DF32D271D0E54AF0150D924A/anonymous/wiris/49728c9f5b4091622e2f4d183d857d35.png\" data-mathml=\"\u00abmath xmlns=\u00a8http://www.w3.org/1998/Math/MathML\u00a8\u00bb\u00abmn\u00bb3\u00ab/mn\u00bb\u00abmo\u00bb/\u00ab/mo\u00bb\u00abmn\u00bb4\u00ab/mn\u00bb\u00abmroot\u00bb\u00abmn\u00bb7\u00ab/mn\u00bb\u00abmn\u00bb2\u00ab/mn\u00bb\u00ab/mroot\u00bb\u00ab/math\u00bb\"></p> <p><a href=\"http://www.blackboard.com\">Blackboard</a></p> </div>"
        availability:
          type: object
          title: Term.Availability
          description: Settings controlling availability of the term to students.
          properties:
            available:
              type: string
              description: >
                Whether the term and the courses it contains are available to students.  Instructors can always access their courses.


                | Type      | Description
                | --------- | --------- |
                | Yes | Students may access the term and the courses it contains. |
                | No | Students may not access the term or the courses it contains. |

              enum:
                - Yes
                - No
            duration:
              type: object
              title: Term.Availability.Duration
              description: Settings controlling the length of time the term is available.
              properties:
                type:
                  type: string
                  description: >
                    The intended length of the term.  Possible values are:


                    | Type      | Description
                    | --------- | --------- |
                    | Continuous | The term is active on an ongoing basis. This is the default. |
                    | DateRange | The term will only be available between specific date ranges. |
                    | FixedNumDays | The term will only be available for a set number of days. |

                  enum:
                    - Continuous
                    - DateRange
                    - FixedNumDays
                start:
                  type: string
                  format: date-time
                  description: The date this term starts.  May only be set if availability.duration.type is DateRange.
                end:
                  type: string
                  format: date-time
                  description: The date this term ends.  May only be set if availability.duration.type is DateRange.
                daysOfUse:
                  type: integer
                  format: int32
                  description: The number of days courses within this term can be used.  May only be set if availability.duration.type is FixedNumDays.

  parameters:
    # Common
    includedFields:
      name: fields
      in: query
      description: A comma-delimited list of fields to include in the response. If not specified, all fields will be returned.
      required: false
      schema:
        type: string
      style: form
      explode: false
    # Paging
    paging.includePermissions:
      name: includePermissions
      in: query
      description: Flag to indicate whether to include permissions in the response.
      required: false
      schema:
        type: boolean
    paging.limit:
      name: limit
      in: query
      description: The maximum number of results to be returned. There may be less if the query returned less than the maximum.
      required: false
      schema:
        type: integer
        format: int32
    paging.offset:
      name: offset
      in: query
      description: The number of rows to skip before beginning to return rows. An offset of 0 is the same as omitting the offset parameter.
      required: false
      schema:
        type: integer
        format: int32

    courseId:
      name: courseId
      in: path
      description: The course or organization ID.  This may be the primary ID, or any of the secondary IDs prefixed with the ID type.
      required: true
      schema:
        type: string
      examples:
        primaryId:
          summary: primary ID type
          value: "_123_1"
        externalId:
          summary: external ID type
          value: externalId:math101
        courseId:
          summary: course ID type
          value: courseId:math101
        uuid:
          summary: uuid ID type
          value: uuid:915c7567d76d444abf1eed56aad3beb5
    contentId:
      name: contentId
      in: path
      description: "The Content ID. This may be the primary ID, or any of the following keywords: interactive, indirect, root."
      required: true
      schema:
        type: string
      examples:
        primaryId:
          summary: primary ID type
          value: "_123_1"
        keyword:
          summary: Using one of the predefined keywords
          value: "root"
    ruleId:
      name: ruleId
      in: path
      description: The rule ID. This should be the primary ID.
      required: true
      schema:
        type: string
      example: _123_1
    criterionId:
      name: criterionId
      in: path
      description: The adaptive release criterion ID. This should be the primary ID.
      required: true
      schema:
        type: string
      example: _123_1
    termId:
      name: termId
      in: path
      description: The term ID. This may be the primary ID, or the secondary ID prefixed with the ID type.
      required: true
      schema:
        type: string
      examples:
        primary:
          summary: Primary ID type.
          value: _123_1
        externalId:
          summary: Secondary ID, prefixed with the ID type.
          value: externalId:spring.2016
